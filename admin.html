<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración - Rifas Premium</title>
    <link rel="stylesheet" href="styles.css?v=7">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { background: #0b132b; }
        .admin-login {
            max-width: 400px;
            margin: 100px auto;
            background: #1c2541;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }
        .admin-dashboard {
            padding: 40px 20px;
            display: none;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .stat-card {
            background: #1c2541;
            padding: 20px;
            border-radius: 10px;
            border-left: 4px solid var(--gold);
        }
        .stat-card h3 { font-size: 0.9rem; opacity: 0.7; margin-bottom: 5px; }
        .stat-card p { font-size: 1.8rem; font-weight: 700; color: var(--gold); }
        
        .table-container {
            background: #1c2541;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            color: #fff;
        }
        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        th { background: rgba(0,0,0,0.2); color: var(--gold); text-transform: uppercase; font-size: 0.8rem; }
        tr:hover { background: rgba(255,255,255,0.02); }
        
        .search-bar {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
        }
        .search-bar input {
            flex: 1;
            padding: 12px;
            border-radius: 5px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.2);
            color: #fff;
        }
        .btn-logout {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            float: right;
        }

        /* Tabs */
        .admin-tabs {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .tab-btn {
            padding: 10px 20px;
            color: #fff;
            background: none;
            border: none;
            cursor: pointer;
            font-weight: 600;
            opacity: 0.6;
            transition: 0.3s;
            border-bottom: 3px solid transparent;
        }
        .tab-btn.active {
            opacity: 1;
            color: var(--gold);
            border-bottom-color: var(--gold);
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }

        /* Message Cards */
        .message-card {
            background: #1c2541;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 15px;
            border-left: 4px solid var(--gold);
        }
        .message-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 0.9rem;
            opacity: 0.8;
        }
    </style>
</head>

<body>
    <div id="login-section" class="admin-login">
        <h2 style="color: var(--gold); margin-bottom: 20px;">Acceso Admin</h2>
        <div class="form-group" style="text-align: left;">
            <label>Usuario</label>
            <input type="text" id="username" style="width: 100%; padding: 10px; margin-bottom: 15px;">
            <label>Contraseña</label>
            <input type="password" id="password" style="width: 100%; padding: 10px; margin-bottom: 20px;">
            <button onclick="login()" class="btn-primary" style="width: 100%; border: none;">Entrar</button>
        </div>
        <p id="login-error" style="color: #ff6b6b; margin-top: 15px; display: none;">Credenciales incorrectas</p>
    </div>

    <div id="dashboard-section" class="admin-dashboard container">
        <button onclick="logout()" class="btn-logout">Cerrar Sesión</button>
        <h1 style="color: var(--gold); margin-bottom: 30px;">Panel de Control</h1>

        <div class="admin-tabs">
            <button class="tab-btn active" onclick="switchTab('ventas')">Ventas y Tickets</button>
            <button class="tab-btn" onclick="switchTab('mensajes')">Mensajes de Contacto</button>
        </div>

        <div id="ventas-tab" class="tab-content active">
            <div class="stats-grid">
                <div class="stat-card">
                    <h3>Ventas Totales</h3>
                    <p id="stat-sold">0</p>
                </div>
                <div class="stat-card">
                    <h3>Recaudación Est.</h3>
                    <p id="stat-revenue">$0</p>
                </div>
                <div class="stat-card">
                    <h3>Disponibles</h3>
                    <p id="stat-available">3500</p>
                </div>
            </div>

            <div class="search-bar">
                <input type="text" id="admin-search" placeholder="Buscar por Nombre, RUT o Número..." onkeyup="filterTable()">
            </div>

            <div class="table-container">
                <table id="admin-table">
                    <thead>
                        <tr>
                            <th>N° Ticket</th>
                            <th>Nombre</th>
                            <th>RUT</th>
                            <th>Teléfono</th>
                            <th>Correo</th>
                            <th>Fecha</th>
                        </tr>
                    </thead>
                    <tbody id="admin-tbody">
                        <!-- Rows injected here -->
                    </tbody>
                </table>
            </div>
        </div>

        <div id="mensajes-tab" class="tab-content">
            <div id="messages-list">
                <!-- Messages injected here -->
            </div>
        </div>
    </div>

    <script>
        function login() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            
            // Hardcoded credentials as requested
            if (user === 'admin' && pass === 'rifa2026') {
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('dashboard-section').style.display = 'block';
                loadData();
            } else {
                document.getElementById('login-error').style.display = 'block';
            }
        }

        function logout() {
            location.reload();
        }

        function loadData() {
            const masterList = JSON.parse(localStorage.getItem('raffle_master_list')) || {};
            const tbody = document.getElementById('admin-tbody');
            tbody.innerHTML = '';
            
            let soldCount = 0;
            const TOTAL = 3500;

            for (let i = 1; i <= TOTAL; i++) {
                const data = masterList[i];
                const tr = document.createElement('tr');
                
                if (data) {
                    soldCount++;
                    tr.innerHTML = `
                        <td><strong>#${i}</strong></td>
                        <td>${data.name}</td>
                        <td>${data.rut}</td>
                        <td>${data.phone}</td>
                        <td>${data.email}</td>
                        <td style="font-size: 0.8rem; opacity: 0.7;">${data.date}</td>
                    `;
                } else {
                    tr.innerHTML = `
                        <td><strong>#${i}</strong></td>
                        <td colspan="5" style="opacity: 0.3; font-style: italic;">Disponible</td>
                    `;
                    tr.classList.add('available-row');
                }
                tbody.appendChild(tr);
            }

            document.getElementById('stat-sold').innerText = soldCount;
            document.getElementById('stat-available').innerText = TOTAL - soldCount;
            // Simplified revenue: count * avg price (assumes promo or normal)
            // Just for show
            document.getElementById('stat-revenue').innerText = '$' + (soldCount * 5000).toLocaleString('es-CL'); 
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            event.currentTarget.classList.add('active');
            document.getElementById(tabId + '-tab').classList.add('active');

            if (tabId === 'ventas') loadData();
            if (tabId === 'mensajes') loadMessages();
        }

        function loadMessages() {
            const messages = JSON.parse(localStorage.getItem('raffle_messages')) || [];
            const container = document.getElementById('messages-list');
            container.innerHTML = '';

            if (messages.length === 0) {
                container.innerHTML = '<p style="opacity: 0.5; text-align: center; margin-top: 50px;">No hay mensajes nuevos.</p>';
                return;
            }

            messages.reverse().forEach(msg => {
                const card = document.createElement('div');
                card.className = 'message-card';
                card.innerHTML = `
                    <div class="message-header">
                        <strong>${msg.name} (${msg.email})</strong>
                        <span>${msg.date}</span>
                    </div>
                    <div class="message-body">
                        <p style="margin: 0;">${msg.message}</p>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function filterTable() {
            const input = document.getElementById('admin-search');
            const filter = input.value.toUpperCase();
            const table = document.getElementById('admin-table');
            const tr = table.getElementsByTagName('tr');

            for (let i = 1; i < tr.length; i++) {
                const text = tr[i].textContent || tr[i].innerText;
                if (text.toUpperCase().indexOf(filter) > -1) {
                    tr[i].style.display = "";
                } else {
                    tr[i].style.display = "none";
                }
            }
        }
    </script>
</body>

</html>
